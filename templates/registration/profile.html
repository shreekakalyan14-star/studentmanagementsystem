{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2>My Profile</h2>

<hr>

<div class="card">

<div class="card-body">

{% if user.profile_picture %}

<img src="{{ user.profile_picture.url }}"
width="150"
class="img-thumbnail mb-3">

{% endif %}

<h4>{{ user.get_full_name }}</h4>

<p>

<strong>Username:</strong>

{{ user.username }}

</p>

<p>

<strong>Email:</strong>

{{ user.email }}

</p>

<p>

<strong>Phone:</strong>

{{ user.phone }}

</p>

<p>

<strong>Role:</strong>

{{ user.role }}

</p>

</div>

</div>

</div>

{% endblock %}
